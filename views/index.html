<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>At&Harmonies - Kézműves Ékszerek</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <header style="background-color: var(--natural-green); padding: 20px; text-align: center; color: white;">
        <h1>At&Harmonies</h1>
        <p>Természet és harmónia</p>
    </header>

    <main>
        <section style="padding: 20px; text-align: center;">
            <h2 style="color: var(--earth-brown);">Kiemelt Termékeink</h2>
            <button class="copper-btn">Fedezd fel a réz erejét</button>
        </section>

        <div class="video-slider-container">
            
            <div class="video-item">
                <video controls>
                    <source src="/videos/nyaklanc.mp4" type="video/mp4">
                    A böngésződ nem támogatja a videók lejátszását.
                </video>
            </div>

            <div class="video-item">
                <video controls>
                    <source src="/videos/karperec.mp4" type="video/mp4">
                    A böngésződ nem támogatja a videók lejátszását.
                </video>
            </div>

        </div>
    </main>

</body>
</html>
